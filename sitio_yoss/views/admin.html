<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Bryan — Yoss 🌸</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="admin-header">
    <div class="admin-header__brand">
      <span class="admin-header__logo">🌸</span>
      <span class="admin-header__title" id="adminGreeting">Panel de Admin</span>
    </div>
    <div class="admin-header__actions">
      <a href="/site" class="btn btn--ghost">👁️ Ver como Yoss</a>
      <button class="btn btn--ghost" id="adminLogout">🚪 Salir</button>
    </div>
  </header>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="admin-main">

    <!-- Quick Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card__value" id="statThoughts">—</div>
        <div class="stat-card__label">Pensamientos</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__value" id="statLetters">—</div>
        <div class="stat-card__label">Cartas</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__value" id="statMoments">—</div>
        <div class="stat-card__label">Momentos</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__value" id="statUnread">—</div>
        <div class="stat-card__label">Sin leer</div>
      </div>
    </div>

    <!-- ═══ CREAR MOMENTO ESPECIAL ═══ -->
    <section class="admin-section">
      <div class="admin-section__header">
        <h2 class="admin-section__title">✨ Crear Momento Especial</h2>
        <span class="admin-section__badge">Sorpresa</span>
      </div>
      <p style="font-size: 0.85rem; color: var(--admin-text-muted); margin-bottom: 1rem;">
        Publica un mensaje especial que Yoss verá como popup al entrar. Solo para ocasiones importantes 💖
      </p>
      <form class="moment-form" id="momentForm">
        <div class="form-row">
          <div class="form-group">
            <label for="momentTitle">Título</label>
            <input type="text" id="momentTitle" placeholder="Ej: Feliz aniversario, mi amor" maxlength="100" required>
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <div class="emoji-select">
              <button type="button" data-emoji="💖">💖</button>
              <button type="button" data-emoji="🌸">🌸</button>
              <button type="button" data-emoji="✨">✨</button>
              <button type="button" data-emoji="💌">💌</button>
              <button type="button" data-emoji="🌙">🌙</button>
              <button type="button" data-emoji="🦋">🦋</button>
              <button type="button" data-emoji="💍">💍</button>
              <button type="button" data-emoji="🎉">🎉</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="momentContent">Tu mensaje especial</label>
          <textarea id="momentContent" rows="5" placeholder="Escribe algo hermoso para ella..." maxlength="5000" required></textarea>
        </div>
        <button type="submit" class="btn btn--primary" style="align-self: flex-end; padding: 0.6rem 1.5rem;">
          ✨ Publicar Momento
        </button>
      </form>
    </section>

    <!-- ═══ MOMENTOS EXISTENTES ═══ -->
    <section class="admin-section">
      <div class="admin-section__header">
        <h2 class="admin-section__title">📋 Momentos Publicados</h2>
      </div>
      <div id="momentList">
        <div class="empty-state">
          <div class="empty-state__emoji">⏳</div>
          <p class="empty-state__text">Cargando...</p>
        </div>
      </div>
    </section>

  </main>

  <script src="/js/admin.js"></script>
</body>
</html>
