<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entra a nuestro universo 💖</title>

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>"
    />

    <!-- Google Fonts - Misma tipografía que el sitio principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ─── Reset & Base ─── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Dancing Script", cursive;
        background: linear-gradient(
          135deg,
          #0d0d1a 0%,
          #1a0a2e 30%,
          #2d1b4e 60%,
          #1a0a2e 100%
        );
        color: #f0e6ff;
        overflow: hidden;
        position: relative;
      }

      /* ─── Animated Stars Background ─── */
      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #ffffff;
        border-radius: 50%;
        animation: twinkle var(--duration) ease-in-out infinite;
        opacity: 0;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.5);
        }
        50% {
          opacity: var(--max-opacity);
          transform: scale(1);
        }
      }

      /* ─── Floating Petals ─── */
      .petal {
        position: fixed;
        font-size: 1.2rem;
        opacity: 0;
        pointer-events: none;
        z-index: 0;
        animation: floatPetal var(--fall-duration) ease-in-out infinite;
        animation-delay: var(--delay);
      }

      @keyframes floatPetal {
        0% {
          transform: translateY(-20px) rotate(0deg) translateX(0px);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(100vh) rotate(360deg) translateX(var(--drift));
          opacity: 0;
        }
      }

      /* ─── Login Container ─── */
      .login-container {
        position: relative;
        z-index: 10;
        width: 90%;
        max-width: 420px;
        padding: 3rem 2.5rem;
        background: rgba(26, 10, 46, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 182, 193, 0.15);
        border-radius: 24px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          0 0 60px rgba(255, 105, 180, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        text-align: center;
        animation: fadeInUp 0.8s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── Logo / Icon ─── */
      .login-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        display: block;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .login-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
        background: linear-gradient(135deg, #ffb6c1, #ff69b4, #ff1493);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .login-subtitle {
        font-size: 1.1rem;
        color: rgba(240, 230, 255, 0.6);
        margin-bottom: 2rem;
        font-weight: 400;
      }

      /* ─── Form Fields ─── */
      .form-group {
        position: relative;
        margin-bottom: 1.5rem;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 1rem;
        color: rgba(255, 182, 193, 0.8);
        margin-bottom: 0.4rem;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 0.9rem 1.2rem;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        font-size: 1rem;
        color: #f0e6ff;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 182, 193, 0.2);
        border-radius: 12px;
        outline: none;
        transition: all 0.3s ease;
      }

      .form-group input::placeholder {
        color: rgba(240, 230, 255, 0.3);
      }

      .form-group input:focus {
        border-color: rgba(255, 105, 180, 0.5);
        box-shadow: 0 0 20px rgba(255, 105, 180, 0.15);
        background: rgba(255, 255, 255, 0.08);
      }

      /* ─── Submit Button ─── */
      .login-btn {
        width: 100%;
        padding: 1rem;
        font-family: "Dancing Script", cursive;
        font-size: 1.3rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #ff69b4, #ff1493, #c71585);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        margin-top: 0.5rem;
      }

      .login-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(255, 105, 180, 0.35);
      }

      .login-btn:hover::before {
        left: 100%;
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* ─── Error Message ─── */
      .login-error {
        display: none;
        padding: 0.8rem 1rem;
        margin-bottom: 1rem;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        font-size: 0.85rem;
        color: #ffb6c1;
        background: rgba(255, 69, 100, 0.12);
        border: 1px solid rgba(255, 69, 100, 0.25);
        border-radius: 10px;
        animation: shake 0.4s ease;
      }

      .login-error.visible {
        display: block;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      /* ─── Loading Spinner ─── */
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ─── Responsive ─── */
      @media (max-width: 480px) {
        .login-container {
          padding: 2rem 1.5rem;
          margin: 1rem;
        }

        .login-title {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated Stars -->
    <div class="stars" id="stars"></div>

    <!-- Floating Petals -->
    <div id="petals"></div>

    <!-- Login Card -->
    <div class="login-container">
      <span class="login-icon">🌸</span>
      <h1 class="login-title">Nuestro Universo</h1>
      <p class="login-subtitle">Solo para nosotros dos... ✨</p>

      <!-- Error display -->
      <div class="login-error" id="loginError"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Tu nombre 💕</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Escribe tu usuario..."
            required
            autocomplete="username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña secreta 🔑</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Nuestra clave especial..."
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Entrar a nuestro mundo 💖
        </button>
      </form>
    </div>

    <script>
      // ─── Stars Background ───
      (function createStars() {
        const container = document.getElementById("stars");
        const count = 80;

        for (let i = 0; i < count; i++) {
          const star = document.createElement("div");
          star.className = "star";
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          star.style.setProperty("--duration", 2 + Math.random() * 4 + "s");
          star.style.setProperty(
            "--max-opacity",
            (0.4 + Math.random() * 0.6).toString(),
          );
          star.style.animationDelay = Math.random() * 4 + "s";
          container.appendChild(star);
        }
      })();

      // ─── Floating Petals ───
      (function createPetals() {
        const container = document.getElementById("petals");
        const petals = ["🌸", "💮", "🏵️"];
        const count = 12;

        for (let i = 0; i < count; i++) {
          const petal = document.createElement("div");
          petal.className = "petal";
          petal.textContent = petals[Math.floor(Math.random() * petals.length)];
          petal.style.left = Math.random() * 100 + "%";
          petal.style.setProperty(
            "--fall-duration",
            8 + Math.random() * 12 + "s",
          );
          petal.style.setProperty("--delay", Math.random() * 10 + "s");
          petal.style.setProperty("--drift", Math.random() * 100 - 50 + "px");
          container.appendChild(petal);
        }
      })();

      // ─── Login Form Handler ───
      const form = document.getElementById("loginForm");
      const errorDiv = document.getElementById("loginError");
      const loginBtn = document.getElementById("loginBtn");
      const originalBtnText = loginBtn.textContent;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Reset error
        errorDiv.classList.remove("visible");
        errorDiv.textContent = "";

        // Get values
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
          showError("Completa ambos campos, por favor 💕");
          return;
        }

        // Loading state
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span>Un momento...';

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            credentials: "same-origin",
          });

          const data = await res.json();

          if (data.success) {
            // Login exitoso → redirigir al sitio principal
            loginBtn.innerHTML = "¡Bienvenid@! 🌸 Entrando...";
            setTimeout(() => {
              window.location.href = "/";
            }, 600);
          } else {
            showError(data.message || "Credenciales incorrectas");
            resetBtn();
          }
        } catch (err) {
          showError("Error de conexión. Intenta de nuevo.");
          resetBtn();
        }
      });

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.add("visible");
      }

      function resetBtn() {
        loginBtn.disabled = false;
        loginBtn.textContent = originalBtnText;
      }
    </script>
  </body>
</html>
