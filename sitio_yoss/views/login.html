<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entra a nuestro universo 💖</title>

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>"
    />

    <!-- Google Fonts - Misma tipografía que el sitio principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <!-- Animated Stars -->
    <div class="stars" id="stars"></div>

    <!-- Floating Petals -->
    <div id="petals"></div>

    <!-- Login Card -->
    <div class="login-container">
      <span class="login-icon">🌸</span>
      <h1 class="login-title">Nuestro Universo</h1>
      <p class="login-subtitle">Solo para nosotros dos... ✨</p>

      <!-- Error display -->
      <div class="login-error" id="loginError"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Tu nombre 💕</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Escribe tu usuario..."
            required
            autocomplete="username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña secreta 🔑</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Nuestra clave especial..."
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Entrar a nuestro mundo 💖
        </button>
      </form>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
